name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build:shared

      - name: Build client
        run: npm run build:client

      - name: Build server
        run: npm run build:server

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t npc-shelf:test .

      - name: Test Docker image
        run: |
          docker run -d --name npc-shelf-test -p 3000:3000 npc-shelf:test
          sleep 5
          curl -f http://localhost:3000/api/health
          docker stop npc-shelf-test

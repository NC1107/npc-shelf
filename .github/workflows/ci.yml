name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build:shared

      - name: Build client
        run: npm run build:client

      - name: Build server
        run: npm run build:server

      - name: Lint
        run: npm run lint || true

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t npc-shelf:test .

      - name: Test Docker image
        run: |
          docker run -d --name npc-shelf-test -p 3000:3000 npc-shelf:test
          sleep 5
          curl -f http://localhost:3000/api/health
          docker stop npc-shelf-test
